<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>News Digest</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* Собственная палитра — одинаковая на всех устройствах, не зависит от темы клиента.
       Переключается только light/dark по реальной теме (см. JS ниже). */
    :root, html[data-theme="light"] {
      --bg: #ffffff;          /* карточка */
      --secondary-bg: #eef0f4;/* фон страницы */
      --text: #1c1c1e;
      --hint: #8a8a8e;
      --divider: #e7e9ee;
      --link: #2f7fd6;
      --accent: #2f7fd6;
    }
    html[data-theme="dark"] {
      --bg: #1c2027;          /* карточка — заметно светлее фона */
      --secondary-bg: #0f1115;/* фон страницы — мягкий тёмный, не чистый чёрный */
      --text: #eef1f5;
      --hint: #8b94a3;
      --divider: #2a2f38;
      --link: #4aa3ff;
      --accent: #4aa3ff;
    }
    /* Фолбэк до инициализации JS — по системной теме */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --bg: #1c2027;
        --secondary-bg: #0f1115;
        --text: #eef1f5;
        --hint: #8b94a3;
        --divider: #2a2f38;
        --link: #4aa3ff;
        --accent: #4aa3ff;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--secondary-bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    .header-glow {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 180px;
      z-index: 0;
      pointer-events: none;
      opacity: 0.5;
      background: radial-gradient(ellipse 120% 100% at 50% 0%, var(--accent) 0%, transparent 65%);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.12), transparent);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.12), transparent);
    }

    .feed {
      position: relative;
      z-index: 1;
      padding: 12px 16px calc(24px + env(safe-area-inset-bottom));
      min-height: 100vh;
    }

    /* Skeleton */
    .skeleton-card {
      background: var(--bg);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .skel-line {
      height: 13px;
      border-radius: 7px;
      background: var(--secondary-bg);
      margin-bottom: 10px;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Card */
    .card {
      background: var(--bg);
      border-radius: 16px;
      padding: 14px 16px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.35s ease;
    }
    .card:active { transform: scale(0.985); }
    .card.expanded {
      box-shadow: 0 6px 24px rgba(0,0,0,0.07);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .card-icon {
      font-size: 17px;
      line-height: 1;
      flex-shrink: 0;
    }
    .card-time {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .card-type {
      font-size: 13px;
      color: var(--hint);
      margin-left: auto;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-preview {
      font-size: 15px;
      line-height: 20px;
      letter-spacing: -0.1px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-full {
      font-size: 15px;
      line-height: 21px;
      letter-spacing: -0.1px;
      white-space: pre-line;
    }

    .card-toggle {
      margin-top: 12px;
      font-size: 14px;
      font-weight: 500;
      color: var(--link);
    }

    .card-sources {
      margin-top: 12px;
      padding-top: 11px;
      border-top: 1px solid var(--divider);
      font-size: 11px;
      color: var(--hint);
      letter-spacing: 0.1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 80px 32px;
      color: var(--hint);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .empty-sub { font-size: 14px; }

    /* Error */
    .error-banner {
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #ff3b30;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header-glow"></div>
  <div class="feed" id="feed"></div>

  <script>
    const API = 'https://kisser.app.n8n.cloud/webhook/digest-history';
    const SOURCES = '@Ateobreaking · @vcnews · @easy_qa_ru · @media_apple';

    let digests = [];
    let expanded = null;

    /* Тема: берём только light/dark из клиента, цвета — наши собственные */
    function applyScheme() {
      var scheme = null;
      try { scheme = Telegram.WebApp.colorScheme; } catch(e) {}
      if (!scheme) {
        scheme = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', scheme);
    }
    try {
      Telegram.WebApp.ready();
      Telegram.WebApp.onEvent('themeChanged', applyScheme);
    } catch(e) {}
    applyScheme();

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatTime(str) {
      try {
        const d = new Date(str);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yest = new Date(+today - 86400000);
        const hh = d.getHours().toString().padStart(2,'0');
        const mm = d.getMinutes().toString().padStart(2,'0');
        if (d >= today) return 'Сегодня, ' + hh + ':' + mm;
        if (d >= yest) return 'Вчера, ' + hh + ':' + mm;
        const M = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        return d.getDate() + ' ' + M[d.getMonth()] + ', ' + hh + ':' + mm;
      } catch(e) { return str || ''; }
    }

    function typeLabel(t) {
      return t === 'morning' ? 'Утренний' : t === 'evening' ? 'Вечерний' : 'Дайджест';
    }

    function typeIcon(t) {
      return t === 'morning' ? '🌅' : t === 'evening' ? '🌙' : '📋';
    }

    function renderSkeletons() {
      document.getElementById('feed').innerHTML = [0,1,2,3].map(() =>
        '<div class="skeleton-card">' +
          '<div class="skel-line" style="width:55%;margin-bottom:12px"></div>' +
          '<div class="skel-line" style="width:100%"></div>' +
          '<div class="skel-line" style="width:100%"></div>' +
          '<div class="skel-line" style="width:70%"></div>' +
        '</div>'
      ).join('');
    }

    function render(error) {
      const feed = document.getElementById('feed');
      let html = '';

      if (error) {
        html += '<div class="error-banner">Не удалось загрузить. Проверьте соединение.</div>';
      }

      if (!digests.length) {
        html += '<div class="empty">' +
          '<div class="empty-icon">📰</div>' +
          '<div class="empty-text">Дайджестов пока нет</div>' +
          '<div class="empty-sub">Бот публикует дайджесты 2 раза в день</div>' +
        '</div>';
      } else {
        digests.forEach(function(d, i) {
          const exp = expanded === i;
          const text = d.text || '';
          const lines = text.split('\n').filter(function(l){ return l.trim(); });
          const preview = lines.slice(0,3).join(' ').slice(0,200) + (text.length > 200 ? '…' : '');

          html +=
            '<div class="card' + (exp ? ' expanded' : '') + '" onclick="toggle(' + i + ')">' +
              '<div class="card-header">' +
                '<span class="card-icon">' + typeIcon(d.type) + '</span>' +
                '<span class="card-time">' + esc(formatTime(d.date)) + '</span>' +
                '<span class="card-type">' + esc(typeLabel(d.type)) + '</span>' +
              '</div>' +
              (exp
                ? '<p class="card-full">' + esc(text) + '</p>'
                : '<p class="card-preview">' + esc(preview) + '</p>'
              ) +
              '<div class="card-toggle">' + (exp ? 'Свернуть' : 'Читать полностью') + '</div>' +
              (exp ? '<div class="card-sources">' + SOURCES + '</div>' : '') +
            '</div>';
        });
      }

      feed.innerHTML = html;
    }

    function toggle(i) {
      expanded = expanded === i ? null : i;
      render(false);
    }

    async function load(skeletons) {
      if (skeletons) renderSkeletons();
      try {
        var resp = await fetch(API);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var data = await resp.json();
        digests = Array.isArray(data) ? data : [];
        expanded = null;
        render(false);
      } catch(e) {
        console.error(e);
        render(true);
      }
    }

    load(true);
  </script>
</body>
</html>
