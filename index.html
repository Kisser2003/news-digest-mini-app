<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>News Digest</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    /* AUTO (default): берётся из Telegram-клиента, иначе из системных настроек */
    :root {
      --bg: var(--tg-theme-bg-color, #ffffff);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #f2f2f7);
      --text: var(--tg-theme-text-color, #000000);
      --hint: var(--tg-theme-hint-color, #8e8e93);
      --link: var(--tg-theme-link-color, #2481cc);
      --accent: var(--tg-theme-button-color, #2481cc);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: var(--tg-theme-bg-color, #17212b);
        --secondary-bg: var(--tg-theme-secondary-bg-color, #0e1621);
        --text: var(--tg-theme-text-color, #ffffff);
        --hint: var(--tg-theme-hint-color, #7d8b99);
        --link: var(--tg-theme-link-color, #2ea6ff);
        --accent: var(--tg-theme-button-color, #2ea6ff);
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--secondary-bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    .header-glow {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 220px;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(46,166,255,0.28) 0%, transparent 70%),
        radial-gradient(ellipse 70% 50% at 85% 0%, rgba(150,110,255,0.22) 0%, transparent 70%);
    }

    .feed {
      position: relative;
      z-index: 1;
      padding: 12px 16px calc(24px + env(safe-area-inset-bottom));
      min-height: 100vh;
    }

    /* Skeleton */
    .skeleton-card {
      background: var(--bg);
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .skel-line {
      height: 13px;
      border-radius: 7px;
      background: var(--secondary-bg);
      margin-bottom: 10px;
      animation: shimmer 1.4s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    /* Card */
    .card {
      background: var(--bg);
      border-radius: 16px;
      padding: 14px 16px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.35s ease;
    }
    .card:active { transform: scale(0.985); }
    .card.expanded {
      box-shadow:
        0 0 0 1px rgba(36,129,204,0.15),
        0 4px 20px rgba(36,129,204,0.18),
        0 0 40px rgba(36,129,204,0.1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 9px;
    }
    .card-time {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .card-type {
      font-size: 12px;
      color: var(--hint);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-sources {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .avatars {
      display: flex;
      padding-left: 6px;
      flex-shrink: 0;
    }
    .avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      margin-left: -6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 0 2px var(--bg);
    }
    .sources-label {
      font-size: 12px;
      color: var(--hint);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-preview {
      font-size: 15px;
      line-height: 20px;
      letter-spacing: -0.1px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-full {
      font-size: 15px;
      line-height: 21px;
      letter-spacing: -0.1px;
      white-space: pre-line;
    }

    .card-toggle {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--link);
    }

    /* Empty */
    .empty {
      text-align: center;
      padding: 80px 32px;
      color: var(--hint);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 16px; font-weight: 500; margin-bottom: 6px; color: var(--text); }
    .empty-sub { font-size: 14px; }

    /* Error */
    .error-banner {
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #ff3b30;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header-glow"></div>
  <div class="feed" id="feed"></div>

  <script>
    const API = 'https://kisser.app.n8n.cloud/webhook/digest-history';
    const AV = [
      { label: 'At', bg: '#e0564f' },
      { label: 'VC', bg: '#3d8bdb' },
      { label: 'QA', bg: '#1a9e8f' },
      { label: 'Ap', bg: '#3a3a3c' }
    ];

    let digests = [];
    let expanded = null;

    try { Telegram.WebApp.ready(); } catch(e) {}

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatTime(str) {
      try {
        const d = new Date(str);
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const yest = new Date(+today - 86400000);
        const hh = d.getHours().toString().padStart(2,'0');
        const mm = d.getMinutes().toString().padStart(2,'0');
        if (d >= today) return 'Сегодня, ' + hh + ':' + mm;
        if (d >= yest) return 'Вчера, ' + hh + ':' + mm;
        const M = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
        return d.getDate() + ' ' + M[d.getMonth()] + ', ' + hh + ':' + mm;
      } catch(e) { return str || ''; }
    }

    function typeLabel(t) {
      return t === 'morning' ? 'Утренний' : t === 'evening' ? 'Вечерний' : 'Дайджест';
    }

    function renderSkeletons() {
      document.getElementById('feed').innerHTML = [0,1,2,3].map(() =>
        '<div class="skeleton-card">' +
          '<div class="skel-line" style="width:55%;margin-bottom:12px"></div>' +
          '<div class="skel-line" style="width:100%"></div>' +
          '<div class="skel-line" style="width:100%"></div>' +
          '<div class="skel-line" style="width:70%"></div>' +
        '</div>'
      ).join('');
    }

    function render(error) {
      const feed = document.getElementById('feed');
      let html = '';

      if (error) {
        html += '<div class="error-banner">Не удалось загрузить. Проверьте соединение.</div>';
      }

      if (!digests.length) {
        html += '<div class="empty">' +
          '<div class="empty-icon">📰</div>' +
          '<div class="empty-text">Дайджестов пока нет</div>' +
          '<div class="empty-sub">Бот публикует дайджесты 2 раза в день</div>' +
        '</div>';
      } else {
        const avHtml = AV.map(a =>
          '<div class="avatar" style="background:' + a.bg + '">' + a.label + '</div>'
        ).join('');

        digests.forEach(function(d, i) {
          const exp = expanded === i;
          const text = d.text || '';
          const lines = text.split('\n').filter(function(l){ return l.trim(); });
          const preview = lines.slice(0,3).join(' ').slice(0,200) + (text.length > 200 ? '…' : '');

          html +=
            '<div class="card' + (exp ? ' expanded' : '') + '" onclick="toggle(' + i + ')">' +
              '<div class="card-header">' +
                '<span class="card-time">' + esc(formatTime(d.date)) + '</span>' +
                '<span class="card-type">' + esc(typeLabel(d.type)) + '</span>' +
              '</div>' +
              '<div class="card-sources">' +
                '<div class="avatars">' + avHtml + '</div>' +
                '<span class="sources-label">@Ateobreaking · @vcnews · @easy_qa_ru · @media_apple</span>' +
              '</div>' +
              (exp
                ? '<p class="card-full">' + esc(text) + '</p>'
                : '<p class="card-preview">' + esc(preview) + '</p>'
              ) +
              '<div class="card-toggle">' + (exp ? 'Свернуть' : 'Читать полностью') + '</div>' +
            '</div>';
        });
      }

      feed.innerHTML = html;
    }

    function toggle(i) {
      expanded = expanded === i ? null : i;
      render(false);
    }

    async function load(skeletons) {
      if (skeletons) renderSkeletons();
      try {
        var resp = await fetch(API);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var data = await resp.json();
        digests = Array.isArray(data) ? data : [];
        expanded = null;
        render(false);
      } catch(e) {
        console.error(e);
        render(true);
      }
    }

    load(true);
  </script>
</body>
</html>
